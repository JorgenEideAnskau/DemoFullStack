<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movies</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!--    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous" defer></script>-->
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="container mt-4">
<div class="container mt-4">
    <h1 class="text-center">Movie Management</h1>
    <table class="table table-bordered table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age_Limit</th>
            <th>Type</th>
            <th>Director</th>
        </tr>
        </thead>
        <tbody id = "deviceTableBody">
        <!-- Data will be inserted here-->
        </tbody>
    </table>
    <button type="button" id="loadMovies" class="btn btn-primary">Load Movies</button>
</div>
<div class="container mt-5" style="align-self: center">
    <form class="card shadow p-4" id="addMovie">
        <h1 class="text-center mb-4">Add Movies</h1>
        <div class="form-group">
            <label style="font-weight: bold" for="movie_name">Movie Name</label>
            <input class="form-control" type="text" id="movie_name" placeholder="Enter movie name" pattern="[A-Za-z]+" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="age_limit">Age Limit</label>
            <input class="form-control" type="text" id="age_limit" placeholder="Enter Age Limit" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="type">Type(Genre)</label>
            <input class="form-control" type="text" id="type" placeholder="Enter the movie genre" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="director">Director</label>
            <input class="form-control" type="text" id="director" placeholder="Enter the name of the director" required>
        </div>
        <div class="btn-group">
            <button type="button" class="btn btn-primary" id="Add" style="width: 150px">Add</button>
        </div>
    </form>

    <form class="card shadow p-4" id="updateMovie">
        <h1 class="text-center mb-4">Update movies</h1>
        <div class="form-group">
            <label style="font-weight: bold" for="movie_id">Movie ID</label>
            <input class="form-control" type="text" id="movie_id" placeholder="Enter movie ID" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="new_movie_name">Movie Name</label>
            <input class="form-control" type="text" id="new_movie_name" placeholder="Enter movie name" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="new_age_limit">Age Limit</label>
            <input class="form-control" type="text" id="new_age_limit" placeholder="Enter Age Limit" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="new_type">Type(Genre)</label>
            <input class="form-control" type="text" id="new_type" placeholder="Enter the movie genre" required>
        </div>
        <div class="form-group">
            <label style="font-weight: bold" for="new_director">Director</label>
            <input class="form-control" type="text" id="new_director" placeholder="Enter the name of the director" required>
        </div>
        <div class="btn-group">
            <button type="button" class="btn btn-primary" id="update" style="width: 150px">update</button>
        </div>
    </form>
</div>
</body>
</html>
